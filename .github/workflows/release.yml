name: Release APK

# Builds the app and publishes a GitHub Release whenever a version tag is pushed
# (e.g. v1.1.0). Uses the built-in GITHUB_TOKEN, so no secrets need to be set up.
# Can also be run manually from the Actions tab via "Run workflow".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage release asset
        run: cp app/build/outputs/apk/debug/app-debug.apk Lamla.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Lamla ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: Lamla.apk
