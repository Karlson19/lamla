name: Release

on:
  push:
    tags:
      - 'v*'           # v1.0.0, v1.2.3, v2.0.0-beta1, etc.
  workflow_dispatch:    # also allow manual runs from the Actions tab

# This workflow:
#   1. Decodes the keystore from a base64-encoded secret
#   2. Writes keystore.properties so the gradle build picks it up
#   3. Runs assembleRelease (R8 minified, signed)
#   4. Uploads the APK as a workflow artifact AND attaches it to the GitHub release
#
# Required secrets (set under repo Settings → Secrets and variables → Actions):
#   LAMLA_KEYSTORE_BASE64    — base64-encoded contents of release.keystore
#                              ( `base64 -w 0 release.keystore | pbcopy` on mac
#                                or `[Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore"))` in PS )
#   LAMLA_KEYSTORE_PASSWORD  — store password
#   LAMLA_KEY_ALIAS          — key alias inside the keystore (e.g. "lamla")
#   LAMLA_KEY_PASSWORD       — key password

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Restore Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.LAMLA_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::LAMLA_KEYSTORE_BASE64 secret is not set." \
              "Generate a release keystore locally with keytool, base64-encode it," \
              "and add it as a repo secret. See README → 'Releasing'."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          # Sanity check that the file is non-empty
          test -s release.keystore || { echo "::error::Decoded keystore is empty"; exit 1; }

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.LAMLA_KEYSTORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.LAMLA_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.LAMLA_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced under app/build/outputs/apk/release"
            exit 1
          fi
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "Produced: $APK"

      - name: Rename APK with version
        id: rename
        run: |
          VER="${GITHUB_REF_NAME#v}"   # strip leading 'v' from tag if present
          NAME="lamla-${VER}.apk"
          cp "${{ steps.locate.outputs.apk }}" "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.name }}
          path: ${{ steps.rename.outputs.name }}
          retention-days: 30

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            **Lamla ${{ github.ref_name }}**

            Native Android app. Install by downloading the APK below, enabling
            "Install unknown apps" for your browser or file manager, and tapping the file.

            Min Android: 8.0 (API 26). No telemetry, no accounts, offline-first.

            ---

            Auto-generated notes follow:
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up secrets
        if: always()
        run: |
          rm -f release.keystore keystore.properties || true
